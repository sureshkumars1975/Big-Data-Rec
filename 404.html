<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Big Data Architecture — Interactive Course</title>
    <script type="text/javascript">
      // GitHub Pages has no server-side rewrite for client-side routes, so a
      // deep link (e.g. /Big-Data-Rec/unit-1) 404s here. Redirect to index.html,
      // encoding the intended path in the query string; index.html decodes it
      // and restores the URL via history.replaceState before React mounts.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
